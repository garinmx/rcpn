<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>RCPN — Resistencia Civil Pacífica</title>

<!-- Open Graph -->
<meta property="og:title" content="Resistencia Civil Pacífica Nacional — RCPN">
<meta property="og:description" content="Un espacio de memoria y acción pacífica. Únete y comparte.">
<meta property="og:image" content="https://rcpn.me/images/preview-og.jpg">
<meta property="og:type" content="website">

<!-- Fav / PWA icons omitted -->

<style>
  /* --- Variables base --- */
  :root{
    --bg-00: #041018;
    --bg-10: #071219;
    --card: #0f1720;
    --text: #eef6f8;
    --muted: #9aa6b2;
    --accent: #ff7a59;
    --focus: 3px solid rgba(255,122,89,0.18);
    --radius: 12px;
  }

  /* fluid typography using clamp */
  html {font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; -webkit-font-smoothing:antialiased;}
  :root {
    font-size: clamp(14px, 1.8vw, 18px);
  }

  /* layout: center column by default */
  body{
    margin:0;
    min-height:100vh;
    background: linear-gradient(180deg,var(--bg-10),var(--bg-00));
    color: var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  .container{
    width: min(980px, 96vw);
    text-align:center;
    padding: clamp(16px, 2.6vw, 36px);
  }

  /* version banner */
  #version-banner{
    position: fixed;
    top: 12px;
    right: 12px;
    z-index:1400;
    background: rgba(2,6,10,0.6);
    color:var(--text);
    padding:8px 12px;
    border-radius:999px;
    font-size: 0.9rem;
    display:inline-flex;
    gap:10px;
    align-items:center;
    box-shadow: 0 8px 30px rgba(2,6,10,0.6);
  }

  /* hero image */
  .hero-box{
    background: #fff;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    margin-bottom: 18px;
  }
  /* the image is responsive and uses object-fit to cover but keep center safe */
  .hero {
    display:block;
    width:100%;
    height: auto;
    max-height: clamp(220px, 36vh, 640px);
    object-fit: cover;
    object-position: 50% 45%; /* slight vertical bias to protect top area */
  }

  .cta {
    background: linear-gradient(180deg,var(--accent), #c65e10);
    color: white;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    font-size: 1.05rem;
    cursor: pointer;
    box-shadow: 0 8px 26px rgba(0,0,0,0.45);
    margin: 10px 0;
  }

  .hint { color: var(--muted); margin-top: 10px; font-size: .98rem; }

  /* modal */
  .modal {
    position: fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background: rgba(2,6,11,0.7);
    z-index:1200;
    padding: 18px;
  }
  .modal[aria-hidden="false"]{ display:flex; }
  .panel {
    width: min(760px, 96%);
    background: linear-gradient(180deg,var(--card), #07111a);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    color: var(--text);
  }
  .panel h1 { margin:0 0 10px; font-size: clamp(18px, 2.6vw, 28px); }
  .manifesto { color:var(--muted); line-height:1.4; margin-bottom: 14px; }

  .share-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:12px; }
  .btn { background:#12202a; color:var(--text); border:0; padding:10px 14px; border-radius:10px; cursor:pointer; text-decoration:none; }
  .btn:focus { outline: var(--focus); }

  .qr { width: 140px; height: 140px; border-radius:8px; padding:8px; background: #fff; margin: 0 auto 6px; display:block; }

  /* focus-visible */
  :focus:not(:focus-visible){ outline: none; box-shadow:none; }
  :focus-visible { outline: var(--focus); }

  /* --- Device-specific sizes --- */
  /* phone typical */
  @media (max-width: 600px) {
    :root { font-size: clamp(14px, 3.6vw, 16px); }
    .panel { padding: 18px; border-radius: 14px; }
    .hero { object-position: 50% 38%; max-height: 48vh; }
  }

  /* tablet / laptop */
  @media (min-width: 601px) and (max-width: 1199px) {
    :root { font-size: clamp(15px, 2.2vw, 17px); }
    .hero { max-height: 44vh; }
  }

  /* desktop & large screens */
  @media (min-width: 1200px) {
    :root { font-size: clamp(16px, 1.4vw, 18px); }
    .container { display:flex; flex-direction:column; align-items:center; }
    .hero { max-height: 52vh; object-position: 50% 45%; }
  }

  /* special for TV/very large screens: bigger UI, more spacing */
  @media (min-width: 1800px), (pointer: coarse) and (min-resolution: 2dppx) {
    /* TVs often have pointer: none or coarse; we detect large width as TV proxy */
    body.device-tv .panel, body.device-tv .hero-box { transform: scale(1.04); }
    .panel { padding: 30px; max-width:1100px; }
    .btn { padding: 14px 18px; font-size: 1.1rem; }
    #version-banner { font-size: 1.05rem; padding:10px 14px; }
  }

  /* accessibility: reduced motion */
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
  <!-- version banner -->
  <div id="version-banner" role="status" aria-live="polite">Versión <strong id="ver">v1.0</strong></div>

  <main class="container" id="root">
    <!-- responsive hero via picture + srcset (1x / 2x and WebP) -->
    <div class="hero-box" aria-hidden="false">
      <picture>
        <source type="image/webp" srcset="images/art.webp 1x, images/art@2x.webp 2x" sizes="(max-width:600px) 92vw, 760px">
        <img id="art" class="hero"
             src="images/art.png"
             srcset="images/art.png 1x, images/art@2x.png 2x"
             sizes="(max-width:600px) 92vw, 760px"
             alt="RCPN — Resistencia Civil Pacífica" loading="eager">
      </picture>
    </div>

    <button id="open" class="cta" aria-controls="modal">Toca para unirnos</button>
    <p class="hint">Comparte este enlace para difundir la voz pacífica y solidaria.</p>
  </main>

  <!-- modal (con focus-trap) -->
  <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="panel" role="document" tabindex="-1">
      <h1 id="modalTitle">Resistencia Civil Pacífica Nacional</h1>
      <p class="manifesto">Somos una red de ciudadanos que exige memoria, respeto y soluciones pacíficas. Si apoyas la paz y la justicia, comparte y difunde este mensaje.</p>

      <div class="share-row" role="toolbar" aria-label="Opciones de compartir">
        <a id="wa" class="btn" target="_blank" rel="noopener">Compartir en WhatsApp</a>
        <a id="tw" class="btn" target="_blank" rel="noopener">Compartir en X</a>
        <button id="copy" class="btn">Copiar enlace</button>
      </div>

      <img id="qr" class="qr" src="images/qr.png" alt="Código QR para escanear y unirse">

      <div style="text-align:center; margin-top:10px">
        <button id="close" class="btn">Cerrar</button>
      </div>
    </div>
  </div>

<script>
/* ---------- Device detection & class assignment ---------- */
(function detectDevice(){
  const ua = navigator.userAgent || '';
  const width = Math.max(screen.width || 0, window.innerWidth || 0);
  // heuristics: TV if very wide or navigator looks like smartTV
  const tvKeyword = /\b(LGWebOS|SMART-TV|SmartTV|BRAVIA|Tizen)\b/i;
  const isTvUA = tvKeyword.test(ua);
  const isLarge = width >= 1800;
  if(isTvUA || isLarge) document.body.classList.add('device-tv');
  else if(window.matchMedia('(max-width:600px)').matches) document.body.classList.add('device-phone');
  else if(window.matchMedia('(max-width:1199px)').matches) document.body.classList.add('device-tablet');
  else document.body.classList.add('device-desktop');
})();

/* ---------- Modal + accessible focus trap ---------- */
(function modalFocusTrap(){
  const openBtn = document.getElementById('open');
  const modal = document.getElementById('modal');
  const panel = modal.querySelector('.panel');
  const closeBtn = document.getElementById('close');
  const wa = document.getElementById('wa');
  const tw = document.getElementById('tw');
  const copy = document.getElementById('copy');
  const qr = document.getElementById('qr');
  const pageUrl = 'https://rcpn.me/';
  const pageTitle = 'Resistencia Civil Pacífica Nacional — RCPN';
  const encodedText = encodeURIComponent(pageTitle + ' — Únete: ' + pageUrl);

  function openModal(){
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden','false');
    panel.focus();
    // set share links
    wa.href = 'https://wa.me/?text=' + encodedText;
    tw.href = 'https://twitter.com/intent/tweet?text=' + encodedText;
  }
  function closeModal(){
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden','true');
    openBtn.focus();
  }

  openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && modal.getAttribute('aria-hidden') === 'false'){ closeModal(); }
    if(e.key === 'Tab' && modal.getAttribute('aria-hidden') === 'false'){ trapFocus(e); }
  });

  // simple focus-trap: keep focus inside panel
  const focusableSelector = 'a[href], button:not([disabled]), textarea, input, [tabindex]:not([tabindex="-1"])';
  function trapFocus(e){
    const nodes = Array.from(panel.querySelectorAll(focusableSelector)).filter(n => n.offsetParent !== null);
    if(!nodes.length) return;
    const first = nodes[0], last = nodes[nodes.length-1];
    if(e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
  }

  // copy link
  copy.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(pageUrl); alert('Enlace copiado'); }
    catch(e){ // fallback
      const tmp = document.createElement('input'); document.body.appendChild(tmp); tmp.value = pageUrl; tmp.select();
      document.execCommand('copy'); tmp.remove(); alert('Enlace copiado (fallback)'); }
  });

  // QR actions: open in new tab and download via anchor
  qr.addEventListener('error', () => { qr.src = 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><rect fill="#0b1318" width="100%" height="100%"/><text x="50%" y="50%" fill="#9aa6b2" font-size="16" text-anchor="middle" dominant-baseline="middle">QR no disponible</text></svg>'); });
})();

/* ---------- Image diagnostics (console only) ---------- */
(function imageDiagnostics(){
  const img = document.getElementById('art');
  img.addEventListener('load', () => {
    console.log('ART loaded', {
      src: img.currentSrc || img.src,
      naturalWidth: img.naturalWidth,
      naturalHeight: img.naturalHeight,
      displayedWidth: Math.round(img.getBoundingClientRect().width),
      devicePixelRatio: window.devicePixelRatio
    });
  });
  img.addEventListener('error', () => console.warn('ART image failed to load:', img.src));
})();
</script>
</body>
</html>
