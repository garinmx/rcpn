<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RCPN — Resistencia Civil Pacífica</title>

<!-- Open Graph / preview (usar URL absoluta + version para forzar recacheo) -->
<meta property="og:title" content="Resistencia Civil Pacífica Nacional — RCPN" />
<meta property="og:description" content="Un espacio de memoria y acción pacífica. Únete, comparte y preserva la verdad." />
<meta property="og:image" content="https://rcpn.me/images/preview-og.jpg?v=1" />
<meta property="og:url" content="https://rcpn.me/" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="manifest" href="/manifest.json" />
<link rel="stylesheet" href="/styles.css" />
<style>
  /* Minimal styles para modal y botones (ajusta a tu theme) */
  :root{
    --bg:#0b1216; --card:#0f1720; --muted:#9aa6b2; --accent:#f97316; --glass: rgba(255,255,255,0.03);
  }
  body{font-family:Inter,system-ui,Segoe UI,Arial; background:linear-gradient(180deg,#071019 0%, #0a0f13 100%); color:#e6eef3; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;}
  .wrap{width:100%;max-width:980px;padding:32px;text-align:center;}
  .hero{width:100%;height:auto;border-radius:12px;box-shadow:0 10px 30px rgba(2,6,23,0.7);display:block;margin:0 auto 18px}
  .cta{background:linear-gradient(180deg,var(--accent),#c65e10);border:0;color:white;padding:14px 22px;border-radius:10px;font-size:18px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.5)}
  .hint{color:var(--muted);margin-top:12px}

  /* Modal */
  .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:linear-gradient(180deg, rgba(4,8,12,0.6), rgba(2,6,11,0.8));backdrop-filter: blur(6px);z-index:1200}
  .modal[aria-hidden="false"]{display:flex}
  .modal-inner{width:92%;max-width:760px;background:linear-gradient(180deg,#0f1720,#0b1318);padding:26px;border-radius:12px;box-shadow:0 20px 60px rgba(2,8,16,0.7);border:1px solid rgba(255,255,255,0.03)}
  .modal-inner h1{margin:0 0 8px;font-size:26px}
  .manifesto{color:var(--muted);margin-bottom:18px}
  .share-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:18px}
  .share-btn{background:var(--glass);color:#e6eef3;border:1px solid rgba(255,255,255,0.04);padding:10px 14px;border-radius:8px;cursor:pointer;text-decoration:none}
  .share-btn:hover{transform:translateY(-2px)}
  .qrwrap{display:flex;justify-content:center;margin:10px 0}
  #qrimg{width:128px;height:128px;border-radius:8px;background:#fff;padding:8px}
  .media-row{display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;justify-content:center;margin-top:10px}
  .preview-block, .qr-block{background:rgba(255,255,255,0.02);padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.02)}
  .preview-block img{width:220px;height:auto;border-radius:8px;display:block}
  .preview-actions, .qr-actions{display:flex;gap:8px;justify-content:center;margin-top:8px;flex-wrap:wrap}
  .small-btn{padding:8px 10px;border-radius:8px;border:0;background:#111827;color:#e6eef3;cursor:pointer}
  .close{margin-top:14px;background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.03);padding:8px 12px;border-radius:8px;cursor:pointer}

  /* toast */
  #toast{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:#0b1318;color:#e6eef3;padding:10px 14px;border-radius:8px;display:none;box-shadow:0 6px 14px rgba(0,0,0,0.6)}
  #toast.show{display:block;animation:fade 2.2s ease forwards}
  @keyframes fade{0%{opacity:0;transform:translateX(-50%) translateY(8px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}90%{opacity:1}100%{opacity:0}}
  @media (max-width:600px){ .preview-block img{width:160px} #qrimg{width:110px;height:110px} .modal-inner{padding:18px} .modal-inner h1{font-size:20px} }
</style>
</head>
<body>
  <main class="wrap">
    <img id="art" src="/images/art.png" alt="RCPN — Resistencia Civil Pacífica" class="hero" />
    <button id="open" class="cta" aria-controls="modal">Toca para unirnos</button>
    <p class="hint">Comparte este enlace para difundir la voz pacífica y solidaria.</p>
  </main>

  <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-inner">
      <h1 id="modalTitle">Resistencia Civil Pacífica Nacional</h1>
      <p class="manifesto">
        Somos una red de ciudadanos que exige memoria, respeto y soluciones pacíficas.
        Si apoyas la paz y la justicia, comparte y difunde este mensaje.
      </p>

      <div class="share-row" role="toolbar" aria-label="Opciones de compartir">
        <a id="wa" class="share-btn" target="_blank" rel="noopener">Compartir en WhatsApp</a>
        <a id="tw" class="share-btn" target="_blank" rel="noopener">Compartir en X</a>
        <button id="copy" class="share-btn" title="Copiar enlace">Copiar enlace</button>
        <button id="nativeShare" class="share-btn" title="Compartir desde el sistema">Compartir (nativo)</button>
      </div>

      <div class="media-row" aria-hidden="false">
        <div class="preview-block" aria-label="Imagen para compartir">
          <img id="previewImg" alt="Imagen de vista previa" src="/images/preview-og.jpg?v=1" loading="lazy" />
          <div class="preview-actions">
            <button id="openPreview" class="small-btn">Abrir imagen</button>
            <button id="downloadPreview" class="small-btn">Descargar imagen</button>
            <button id="copyPreviewImg" class="small-btn" title="Copiar imagen al portapapeles">Copiar imagen</button>
          </div>
        </div>

        <div class="qr-block" aria-label="Código QR">
          <div class="qrwrap"><img id="qrimg" src="/images/qr.png" alt="QR — escanea para abrir" /></div>
          <div class="qr-actions">
            <button id="openQR" class="small-btn">Abrir QR</button>
            <button id="downloadQR" class="small-btn">Descargar QR</button>
            <button id="shareQR" class="small-btn" title="Compartir QR (móviles)">Compartir QR</button>
          </div>
        </div>
      </div>

      <div style="text-align:center"><button id="close" class="close">Cerrar</button></div>
    </div>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

<script>
(() => {
  const pageUrl = 'https://rcpn.me/';
  const pageTitle = 'Resistencia Civil Pacífica Nacional — RCPN';
  const encodedText = encodeURIComponent(pageTitle + ' — Únete: ' + pageUrl);

  // DOM
  const openBtn = document.getElementById('open');
  const modal = document.getElementById('modal');
  const closeBtn = document.getElementById('close');
  const wa = document.getElementById('wa');
  const tw = document.getElementById('tw');
  const copyBtn = document.getElementById('copy');
  const nativeShareBtn = document.getElementById('nativeShare');
  const toast = document.getElementById('toast');

  const previewImg = document.getElementById('previewImg');
  const openPreviewBtn = document.getElementById('openPreview');
  const downloadPreviewBtn = document.getElementById('downloadPreview');
  const copyPreviewImgBtn = document.getElementById('copyPreviewImg');

  const qrImg = document.getElementById('qrimg');
  const openQRBtn = document.getElementById('openQR');
  const downloadQRBtn = document.getElementById('downloadQR');
  const shareQRBtn = document.getElementById('shareQR');

  // Toast helper
  function showToast(msg, time=2200){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=> toast.classList.remove('show'), time);
  }

  // Open modal
  openBtn.addEventListener('click', () => {
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden','false');
    closeBtn.focus();
    // Set share links
    wa.href = `https://wa.me/?text=${encodedText}`;
    tw.href = `https://twitter.com/intent/tweet?text=${encodedText}`;
    // Ensure QR image source is set (lazy support)
    if(!qrImg.src || qrImg.src.endsWith('/images/qr.png')){
      qrImg.src = '/images/qr.png';
    }
  });

  // Close modal (click + ESC)
  closeBtn.addEventListener('click', closeModal);
  window.addEventListener('keydown', (e) => { if(e.key==='Escape'){ closeModal(); }});
  modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

  function closeModal(){
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden','true');
    openBtn.focus();
  }

  // Copy link
  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(pageUrl);
      showToast('Enlace copiado en el portapapeles');
    } catch (err) {
      showToast('No se pudo copiar automáticamente. Selecciona y copia manualmente.');
    }
  });

  // Native Web Share
  nativeShareBtn.addEventListener('click', async () => {
    if(navigator.share){
      try {
        await navigator.share({ title: pageTitle, text: pageTitle, url: pageUrl });
      } catch (err) {
        // usuario canceló o falló
        console.log('share error', err);
      }
    } else {
      showToast('Compartir nativo no soportado en este navegador');
    }
  });

  // Preview: abrir en nueva pestaña
  openPreviewBtn.addEventListener('click', () => window.open(previewImg.src, '_blank', 'noopener'));

  // Descargar preview
  downloadPreviewBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = previewImg.src;
    a.download = 'rcpn-preview.jpg';
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  // Copiar preview al clipboard (image)
  copyPreviewImgBtn.addEventListener('click', async () => {
    try {
      if(!navigator.clipboard || !window.ClipboardItem) throw new Error('Clipboard image not supported');
      const res = await fetch(previewImg.src);
      const blob = await res.blob();
      await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
      showToast('Imagen copiada al portapapeles');
    } catch (err) {
      console.warn(err);
      showToast('No soportado: descarga la imagen y compártela manualmente');
    }
  });

  // QR: abrir grande
  openQRBtn.addEventListener('click', () => window.open(qrImg.src, '_blank', 'noopener'));

  // QR: download
  downloadQRBtn.addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = qrImg.src;
    a.download = 'rcpn-qr.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  // QR: share via Web Share API with file (mobile)
  shareQRBtn.addEventListener('click', async () => {
    try {
      const res = await fetch(qrImg.src);
      const blob = await res.blob();
      const file = new File([blob], 'rcpn-qr.png', { type: blob.type });
      if(navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share){
        await navigator.share({ files: [file], title: 'QR RCPN', text: 'Escanea para unirte: ' + pageUrl });
      } else {
        // fallback: descargar y mostrar toast
        downloadQRBtn.click();
        showToast('Compartir QR no soportado: se descargó el archivo');
      }
    } catch (err) {
      console.error(err);
      downloadQRBtn.click();
      showToast('Error compartiendo QR, se descargó el archivo');
    }
  });

  // Register service worker (if exists)
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/service-worker.js').catch(console.error);
  }

})();
</script>
</body>
</html>
