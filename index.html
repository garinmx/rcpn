<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RCPN — Resistencia Civil Pacífica</title>

<!-- Open Graph básico (opcional) -->
<meta property="og:title" content="Resistencia Civil Pacífica Nacional — RCPN">
<meta property="og:description" content="Un espacio de memoria y acción pacífica. Únete y comparte.">
<meta property="og:image" content="https://rcpn.me/images/preview-og.jpg">

<style>
  /* Simple, mobile-first */
  :root{--bg:#061018;--card:#0f1720;--text:#eef6f8;--muted:#9aa6b2;--accent:#ff7a59}
  html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial;}
  body{background:linear-gradient(180deg,var(--bg),#041018);color:var(--text);display:flex;align-items:center;justify-content:center;padding:20px;}
  .wrap{width:100%;max-width:520px;text-align:center;}
  .hero{width:92%;max-width:420px;border-radius:12px;display:block;margin:0 auto 18px;box-shadow:0 8px 30px rgba(0,0,0,0.6);background:#fff;padding:8px}
  .cta{display:inline-block;background:var(--accent);color:#fff;padding:14px 20px;border-radius:12px;border:0;font-size:18px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,0.4)}
  .hint{color:var(--muted);margin-top:14px;font-size:15px}
  /* Modal */
  .modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);padding:18px;z-index:999;}
  .modal[aria-hidden="false"]{display:flex;}
  .card{width:100%;max-width:420px;background:linear-gradient(180deg,#0b1418,#071018);border-radius:14px;padding:20px;color:var(--text);box-shadow:0 20px 60px rgba(0,0,0,0.6)}
  h1{margin:0 0 8px;font-size:20px}
  p.manifesto{color:var(--muted);margin:0 0 14px;font-size:15px;line-height:1.4}
  .btn-row{display:flex;flex-direction:column;gap:10px;margin:10px 0}
  .share-btn{background:#12202a;border:0;color:var(--text);padding:12px;border-radius:10px;cursor:pointer;font-size:16px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
  .share-btn:active{transform:translateY(1px)}
  .qrwrap{display:flex;justify-content:center;margin:14px 0}
  #qrimg{width:140px;height:140px;border-radius:8px;background:#fff;padding:8px;object-fit:contain}
  .small{font-size:14px;padding:10px}
  .close{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--muted);padding:10px 12px;border-radius:8px;cursor:pointer;margin-top:6px}
  @media(min-width:600px){ .btn-row{flex-direction:row;flex-wrap:wrap;justify-content:center} .share-btn{min-width:160px} }
</style>
</head>
<body>
  <main class="wrap" id="main">
    <!-- hero image (usa tu art.png) -->
    <img id="art" class="hero" src="/images/art.png" alt="RCPN — Resistencia Civil Pacífica" />
    <button id="open" class="cta" aria-controls="modal">Toca para unirnos</button>
    <p class="hint">Comparte este enlace para difundir la voz pacífica y solidaria.</p>
  </main>

  <!-- modal simple -->
  <div id="modal" class="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="card" role="document">
      <h1 id="modalTitle">Resistencia Civil Pacífica Nacional</h1>
      <p class="manifesto">Somos una red de ciudadanos que exige memoria, respeto y soluciones pacíficas. Si apoyas la paz y la justicia, comparte y difunde este mensaje.</p>

      <div class="btn-row" role="toolbar" aria-label="Opciones de compartir">
        <a id="wa" class="share-btn" target="_blank" rel="noopener noreferrer">Compartir en WhatsApp</a>
        <a id="tw" class="share-btn" target="_blank" rel="noopener noreferrer">Compartir en X</a>
        <button id="copy" class="share-btn">Copiar enlace</button>
      </div>

      <div class="qrwrap">
        <img id="qrimg" src="/images/qr.png" alt="QR — escanea para abrir" />
      </div>

      <div class="btn-row" style="margin-top:6px;">
        <button id="openQR" class="share-btn small">Abrir QR</button>
        <button id="downloadQR" class="share-btn small">Descargar QR</button>
      </div>

      <div style="text-align:center"><button id="close" class="close">Cerrar</button></div>
    </div>
  </div>

<script>
/* VARIABLES */
const pageUrl = 'https://rcpn.me/';
const pageTitle = 'Resistencia Civil Pacífica Nacional — RCPN';
const encodedText = encodeURIComponent(pageTitle + ' — Únete: ' + pageUrl);

/* ELEMENTOS */
const openBtn = document.getElementById('open');
const modal = document.getElementById('modal');
const closeBtn = document.getElementById('close');

const wa = document.getElementById('wa');
const tw = document.getElementById('tw');
const copyBtn = document.getElementById('copy');

const qrImg = document.getElementById('qrimg');
const openQRBtn = document.getElementById('openQR');
const downloadQRBtn = document.getElementById('downloadQR');

/* ABRIR MODAL */
openBtn.addEventListener('click', () => {
  modal.style.display = 'flex';
  modal.setAttribute('aria-hidden','false');

  // enlaces
  wa.href = 'https://wa.me/?text=' + encodedText;
  tw.href = 'https://twitter.com/intent/tweet?text=' + encodedText;

  // foco accesible en cerrar
  closeBtn.focus();
});

/* CERRAR MODAL */
closeBtn.addEventListener('click', closeModal);
window.addEventListener('keydown', (e) => { if(e.key === 'Escape' && modal.getAttribute('aria-hidden') === 'false') closeModal(); });
modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

function closeModal(){
  modal.style.display = 'none';
  modal.setAttribute('aria-hidden','true');
  openBtn.focus();
}

/* COPIAR ENLACE */
copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(pageUrl);
    alert('Enlace copiado: ' + pageUrl);
  } catch (err) {
    // fallback simple
    const tmp = document.createElement('input');
    document.body.appendChild(tmp);
    tmp.value = pageUrl;
    tmp.select();
    document.execCommand('copy');
    tmp.remove();
    alert('Enlace copiado (fallback): ' + pageUrl);
  }
});

/* ABRIR QR */
openQRBtn.addEventListener('click', () => {
  window.open(qrImg.src, '_blank', 'noopener');
});

/* DESCARGAR QR */
downloadQRBtn.addEventListener('click', () => {
  const a = document.createElement('a');
  a.href = qrImg.src;
  a.download = 'rcpn-qr.png';
  document.body.appendChild(a);
  a.click();
  a.remove();
});

/* PRECAUCIÓN: si el QR no carga, asegúrate de que /images/qr.png exista en tu repo. */
</script>
</body>
</html>
